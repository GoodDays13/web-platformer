<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CTF Platformer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: monospace;
      color: #ccc;
      gap: 12px;
    }

    canvas {
      border: 2px solid #333;
      background: #111;
      display: block;
    }

    #status {
      font-size: 13px;
      color: #555;
    }

    #status.connected {
      color: #4caf50;
    }

    #status.disconnected {
      color: #f44336;
    }

    button {
      background: #1a1a1a;
      color: #ccc;
      border: 1px solid #333;
      padding: 4px 12px;
      font-family: monospace;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover {
      background: #222;
      border-color: #555;
      color: #fff;
    }

    button:active {
      background: #2a2a2a;
    }
  </style>
</head>

<body>
  <canvas id="game" width="800" height="400"></canvas>
  <div id="status" class="disconnected">disconnected</div>
  <div style="display:flex;gap:8px;">
    <button id="btn-save" onclick="sendKey('save')">save</button>
    <button id="btn-load" onclick="sendKey('load')">load</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');

    // Game state — only what the server tells us
    let state = null;

    // -------------------------
    // WebSocket
    // -------------------------
    let socket;
    let ping = undefined;

    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.host;
      socket = new WebSocket(`${protocol}//${host}`);

      socket.addEventListener('open', () => {
        status.textContent = 'connected';
        status.className = 'connected';
      });

      socket.addEventListener('close', () => {
        status.textContent = 'disconnected — retrying...';
        status.className = 'disconnected';
        setTimeout(connect, 2000); // auto-reconnect
      });

      socket.addEventListener('message', (event) => {
        // Server sends back authoritative state — just store it
        const data = JSON.parse(event.data);
        if (data.type === 'pong') {
          const pingTime = Date.now() - ping;
          status.textContent = `connected ${pingTime}ms`;
          ping = undefined
        } else {
          state = data;
        }
      });

      setInterval(() => {
        if (!ping && socket?.readyState === WebSocket.OPEN) {
          const time = Date.now();
          ping = time;
          socket.send(JSON.stringify({type: "ping", time: time}));
        }
      }, 1000);
    }

    connect();

    // -------------------------
    // Input — send to server, nothing else
    // -------------------------
    const KEYS = new Set([
      'KeyW', 'KeyA', 'KeyS', 'KeyD',
      'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
      'Space'
    ]);

    document.addEventListener('keydown', (e) => {
      if (!KEYS.has(e.code)) return;
      if (e.repeat) return;
      e.preventDefault();

      if (socket?.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({key: e.code, down: true}));
      }
    });

    document.addEventListener('keyup', (e) => {
      if (!KEYS.has(e.code)) return;
      e.preventDefault();

      if (socket?.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({key: e.code, down: false}));
      }
    });

    function sendKey(type) {
      if (socket?.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({key: type}));
      }
    }

    // -------------------------
    // Render loop — draw what server says
    // -------------------------
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!state) {
        // Waiting for first server message
        ctx.fillStyle = '#333';
        ctx.font = '14px monospace';
        ctx.fillText('waiting for server...', 20, 30);
        requestAnimationFrame(draw);
        return;
      }

      state.forEach((item) => {
        ctx.fillStyle = item.color;
        ctx.fillRect(item.x, canvas.height - item.y - item.height, item.width, item.height);
      });

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>

</html>
